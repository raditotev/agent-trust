# SECURITY: Set POSTGRES_PASSWORD and REDIS_PASSWORD before running.
# Example: POSTGRES_PASSWORD=secure_random_password docker compose up -d
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_trust}
      POSTGRES_USER: ${POSTGRES_USER:-agent_trust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-agent_trust}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-changeme}']
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  agent-trust:
    build: .
    ports:
      - '8140:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent_trust}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-agent_trust}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      ENVIRONMENT: production
      AUTH_PROVIDER: both
      MCP_TRANSPORT: streamable-http
      MCP_PORT: ${MCP_PORT:-8000}
      JSON_LOGS: 'true'
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys
    restart: unless-stopped

  worker:
    build: .
    command: ['uv', 'run', 'python', 'scripts/run_worker.py']
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent_trust}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-agent_trust}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - agent-trust
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - '127.0.0.1:3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
